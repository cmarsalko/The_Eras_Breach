<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Section</title>

  <link rel="stylesheet" href="VideoPages/endvideo.css">
</head>

<body>
  <header>
        <h1>The Eras Breach</h1>
        <nav>
            <ul>
                <li><a href="PoliceReportEscapeRoom.html">Police Report</a></li>
                <li><a href="index.html">Reset</a></li>
                <!--Home button will always take you back to this page, reset takes you to start game page-->
            </ul>
        </nav>
    </header>

  <main class="frame">

    <div id="completion-banner" style="text-align:center; font-family:Roboto,sans-serif; margin-bottom:24px;">
      <p style="font-size:18px; margin:0;">Case closed! Time to crack the case:</p>
      <p id="final-time" style="font-size:48px; font-weight:900; letter-spacing:4px; margin:8px 0;">--:--</p>
    </div>

    <script>
      const raw = parseInt(sessionStorage.getItem('erasBreachTime'));
      if (!isNaN(raw)) {
        const mins = String(Math.floor(raw / 60)).padStart(2, '0');
        const secs = String(raw % 60).padStart(2, '0');
        document.getElementById('final-time').textContent = mins + ':' + secs;
      }
    </script>

    <!-- Placeholder version -->
    <section class="video-box">
      <div class="video-label"></div>
    </section>

    <!-- Real video version  -->
    <section class="video-box">
      <iframe width="960" height="540" src="https://www.youtube.com/embed/sX98FYYGeMc?si=AsTQXmMWmaNRofk2" 
      title="YouTube video player" frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

  </main>

</body>
</html>
